<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Well Soon My Princess</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at center, #ffe6f0, #ff99cc);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Arial', sans-serif;
        overflow: hidden;
        color: #fff;
    }
    .heart-container {
        position: relative;
        width: 300px;
        height: 300px;
        animation: rotate 10s linear infinite;
    }
    @keyframes rotate {
        from {transform: rotate(0deg);}
        to {transform: rotate(360deg);}
    }
    .heart-text {
        position: absolute;
        width: 100%;
        height: 100%;
        font-size: 18px;
        font-weight: bold;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        text-align: center;
        transform-origin: center center;
        color: #ff0066;
    }
    .message {
        position: absolute;
        top: 20%;
        width: 100%;
        text-align: center;
        font-size: 2em;
        font-weight: bold;
        animation: fadeIn 2s ease-in-out forwards;
    }
    .lines {
        position: absolute;
        bottom: 10%;
        width: 80%;
        text-align: center;
        font-size: 1.2em;
        line-height: 1.6;
        animation: slideUp 3s ease-in-out forwards;
        opacity: 0;
    }
    @keyframes fadeIn {
        0% {opacity: 0; transform: scale(0.5);}
        100% {opacity: 1; transform: scale(1);}
    }
    @keyframes slideUp {
        0% {opacity: 0; transform: translateY(50px);}
        100% {opacity: 1; transform: translateY(0);}
    }
</style>
</head>
<body>
    <div class="heart-container">
        <div class="heart-text" id="heart"></div>
    </div>
    <div class="message">Get Well Soon My Princess ❤️</div>
    <div class="lines">
        You are strong, my princess.<br>
        Even when the world feels heavy,<br>
        Your smile lights up everything.<br>
        Keep shining, keep smiling,<br>
        I’m always here for you.<br>
        Love surrounds you always.
    </div>

<script>
    const heartContainer = document.getElementById('heart');
    const text = "LOVE ";
    const size = 300;
    const points = 200;

    for(let i=0; i<points; i++){
        const t = i/points * 2 * Math.PI;
        const x = size/2 * 16 * Math.pow(Math.sin(t), 3)/17 + size/2;
        const y = -size/2 * (13 * Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t))/17 + size/2;
        const span = document.createElement('span');
        span.innerText = text[i % text.length];
        span.style.position = 'absolute';
        span.style.left = `${x}px`;
        span.style.top = `${y}px`;
        heartContainer.appendChild(span);
    }
</script>
</body>
</html>
