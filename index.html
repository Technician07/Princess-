<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Well Soon My Princess</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff5f9e,#ffc3a0,#ffdde1);
overflow:hidden;
font-family:'Montserrat',sans-serif;
}

/* glowing romantic background */

body:before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#ffffff33 2px,transparent 2px);
background-size:40px 40px;
animation:moveBg 40s linear infinite;
}

@keyframes moveBg{
0%{transform:translate(0,0)}
100%{transform:translate(-200px,-200px)}
}

/* container */

.container{
text-align:center;
position:relative;
z-index:2;
}

/* title */

.title{
font-size:42px;
font-family:'Playfair Display',serif;
color:white;
margin-bottom:40px;
text-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* heart */

.heart{
width:320px;
height:320px;
position:relative;
margin:auto;
animation:heartRotate 12s linear infinite;
}

@keyframes heartRotate{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.heart span{
position:absolute;
font-weight:600;
color:#ff0055;
font-size:18px;
}

/* typing text */

.typing{
margin-top:50px;
font-size:28px;
font-weight:600;
color:white;
border-right:3px solid white;
white-space:nowrap;
overflow:hidden;
width:0;
animation:typing 4s steps(25,end) forwards, blink .8s infinite;
}

@keyframes typing{
from{width:0}
to{width:320px}
}

@keyframes blink{
50%{border-color:transparent}
}

</style>
</head>

<body>

<div class="container">

<div class="title">Get Well Soon My Princess ❤️</div>

<div class="heart" id="heart"></div>

<div class="typing">You are my strong lady.</div>

</div>

<script>

const heart = document.getElementById("heart")
const text = "Somi "
const points = 220
const scale = 11

for(let i=0;i<points;i++){

let t = i/points * 2*Math.PI

let x = 16*Math.pow(Math.sin(t),3)
let y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

let span = document.createElement("span")
span.innerText = text[i % text.length]

span.style.left = (160 + x*scale) + "px"
span.style.top = (160 - y*scale) + "px"

heart.appendChild(span)

}

</script>

</body>
</html>
